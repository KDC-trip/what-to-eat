<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>美食全攻略</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-meal">

    <div class="nav">
        <button style="background: #e67e22;" onclick="switchMode('meal')">🍱 正餐大富翁</button>
        <button style="background: #ff6b81;" onclick="switchMode('snack')">🍰 點心驚喜盒</button>
        <button style="background: #6c5ce7;" onclick="switchMode('night')">🎡 夜市抽獎機</button>
    </div>

    <div class="container">
        <h1 id="title">🍱 正餐大富翁</h1>
        <div class="controls">
            <input type="text" id="foodInput" placeholder="想吃什麼？" onkeypress="if(event.key==='Enter') addFood()">
            <button onclick="addFood()" style="padding: 10px 20px; border-radius: 8px; border: none; background: var(--active-color); color: white; cursor: pointer;">新增</button>
        </div>

        <div class="game-view" id="gameView"></div>

        <div class="food-pool">
            <div style="font-weight: bold; margin-bottom: 10px; color: #666;">📜 目前獎池 (點擊 ✕ 刪除)：</div>
            <div id="poolList" class="pool-list"></div>
        </div>

        <div id="result-text">準備好了嗎？</div>
    </div>

<script>
    // 預設資料
    const data = {
        meal: ["牛肉麵", "壽司", "滷肉飯", "便利商店", "水餃", "煎餃", "麥當勞", "義大利麵", "火鍋", "拉麵", "便當", "肯德基"],
        snack: ["雞蛋仔", "紅豆餅", "雞排", "地瓜球", "手搖飲", "可麗餅", "甜甜圈", "鬆餅", "豆花", "冰淇淋", "布丁", "泡芙"],
        night: ["臭豆腐", "蚵仔煎", "大腸包小腸", "烤魷魚", "排骨酥", "章魚燒", "地瓜球", "骰子牛", "糖葫蘆", "滷味", "鹹酥雞", "胡椒餅"]
    };
    const fillers = ["下 1 格", "前 3 格", "下 2 格", "再選一次"];
    let foods = [...data.meal];
    let gridContent = [];
    let currentMode = 'meal';
    let isRunning = false;
    let currentIndex = 0;

    function switchMode(mode) {
        if(isRunning) return;
        currentMode = mode;
        foods = [...data[mode]];
        document.body.className = `theme-${mode}`;
        document.getElementById('title').innerText = mode==='meal'?"🍱 正餐大富翁":mode==='snack'?"🍰 點心驚喜盒":"🎡 夜市抽獎機";
        refreshUI();
    }

    function refreshUI() {
        renderView();
        updatePoolList();
    }

    function renderView() {
        const view = document.getElementById("gameView");
        view.innerHTML = "";
        
        if (currentMode === 'night') {
            view.innerHTML = `
                <div class="slot-container">
                    <div class="slot-machine"><div class="slot-window" id="slotOutput">? ? ?</div></div>
                    <div class="lever-base" onclick="handleLeverClick()">
                        <div class="lever-arm" id="leverArm"><div class="lever-knob"></div></div>
                    </div>
                </div>
            `;
        } else {
            const board = document.createElement('div');
            board.className = "board-grid";
            let n = 4; while ((4 * n - 4) < foods.length) n++;
            board.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
            board.style.gridTemplateRows = `repeat(${n}, 1fr)`;
            
            gridContent = [...foods].sort(() => Math.random() - 0.5);
            let fIdx = 0; while (gridContent.length < (4*n-4)) { gridContent.push(fillers[fIdx % fillers.length]); fIdx++; }
            gridContent = gridContent.sort(() => Math.random() - 0.5);

            const path = [];
            for (let i = 0; i < n; i++) path.push({r: 1, c: i + 1});
            for (let i = 2; i < n; i++) path.push({r: i, c: n});
            for (let i = n; i >= 1; i--) path.push({r: n, c: i});
            for (let i = n - 1; i >= 2; i--) path.push({r: i, c: 1});

            gridContent.forEach((text, i) => {
                const div = document.createElement('div');
                div.className = 'cell' + (fillers.includes(text) ? ' special' : '');
                div.id = `cell-${i}`; div.innerText = text;
                div.style.gridRow = path[i].r; div.style.gridColumn = path[i].c;
                board.appendChild(div);
            });
            view.appendChild(board);
            const btnArea = document.createElement('div');
            btnArea.className = "center-btn-area";
            btnArea.innerHTML = `<button class="main-btn" onclick="startGridGame()">幫我選一個</button>`;
            view.appendChild(btnArea);
        }
    }

    function updatePoolList() {
        const list = document.getElementById("poolList");
        list.innerHTML = "";
        foods.forEach((f, idx) => {
            const item = document.createElement("span");
            item.className = "pool-item";
            item.innerHTML = `${f} <b onclick="removeFood(${idx})">✕</b>`;
            list.appendChild(item);
        });
    }

    function removeFood(idx) {
        if(isRunning) return;
        foods.splice(idx, 1);
        refreshUI();
    }

    function addFood() {
        const input = document.getElementById("foodInput");
        if(input.value.trim()){ foods.push(input.value.trim()); input.value=""; refreshUI(); }
    }

    function handleLeverClick() {
        if(isRunning) return;
        const arm = document.getElementById("leverArm");
        arm.classList.add("pulling");
        setTimeout(() => arm.classList.remove("pulling"), 400);
        startSlot();
    }

    function startSlot() {
        isRunning = true; const out = document.getElementById("slotOutput");
        let count = 0;
        const timer = setInterval(() => {
            out.innerText = foods[Math.floor(Math.random()*foods.length)];
            if(count++ > 30){ clearInterval(timer); isRunning=false; document.getElementById("result-text").innerText="🎉 抽到："+out.innerText; }
        }, 70);
    }

    function startGridGame() {
        if(isRunning) return; isRunning = true;
        let steps = 0; let total = gridContent.length * 3 + Math.floor(Math.random()*gridContent.length);
        let speed = 50;
        function run() {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
            currentIndex = currentMode==='meal' ? (currentIndex+1)%gridContent.length : Math.floor(Math.random()*gridContent.length);
            document.getElementById(`cell-${currentIndex}`).classList.add('active');
            if(++steps < total){ if(total-steps<10) speed+=40; setTimeout(run, speed); }
            else { isRunning=false; document.getElementById("result-text").innerText="🎉 決定吃："+gridContent[currentIndex]; }
        }
        run();
    }

    refreshUI();
</script>
</body>
</html>
