<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>要吃什麼好呢？</title>
    <style>
        /* 簡單加一點樣式讓介面更清爽 */
        .container { text-align: center; margin-top: 50px; font-family: sans-serif; }
        .menu-list { margin: 20px auto; max-width: 300px; text-align: left; border: 1px solid #ddd; padding: 10px; border-radius: 8px; }
        .input-group { margin-bottom: 20px; }
        input { padding: 5px; border-radius: 4px; border: 1px solid #ccc; }
        button { cursor: pointer; padding: 5px 15px; border-radius: 4px; border: none; background-color: #007bff; color: white; }
        button:hover { background-color: #0056b3; }
        .decide-btn { background-color: #28a745; font-size: 1.2rem; padding: 10px 20px; }
        .decide-btn:hover { background-color: #218838; }
    </style>
</head>
<body>

    <div class="container">
        <h1>要吃什麼好呢？</h1>
        
        <div class="input-group">
            <input type="text" id="foodInput" placeholder="輸入你想吃的..." onkeypress="handleKeyPress(event)">
            <button onclick="addFood()">新增選項</button>
        </div>

        <div class="menu-list">
            <strong>目前候選名單：</strong>
            <div id="displayList"></div>
        </div>

        <hr>

        <p id="suggestion">準備好了嗎？點擊按鈕決定下一餐！</p>
        <button class="decide-btn" onclick="decide()">幫我選一個</button>
    </div>

    <script>
        // 預設選項
        let foods = ["牛肉麵", "迴轉壽司", "滷肉飯", "便利商店", "水餃", "煎餃", "豆花", "麥當勞", "義大利麵", "火鍋"];

        // 初始化顯示清單
        updateDisplay();

        // 新增食物的函式
        function addFood() {
            const input = document.getElementById("foodInput");
            const newFood = input.value.trim();
            
            if (newFood !== "") {
                foods.push(newFood);
                input.value = ""; // 清空輸入框
                updateDisplay();
            } else {
                alert("請輸入食物名稱內容喔！");
            }
        }

        // 按下 Enter 鍵也能新增
        function handleKeyPress(event) {
            if (event.key === "Enter") {
                addFood();
            }
        }

        // 更新畫面上的清單文字
        function updateDisplay() {
            const listDiv = document.getElementById("displayList");
            listDiv.innerText = foods.join("、");
        }

        // 隨機決定
        function decide() {
            if (foods.length === 0) {
                document.getElementById("suggestion").innerText = "清單是空的，先加點想吃的吧！";
                return;
            }
            const random = Math.floor(Math.random() * foods.length);
            document.getElementById("suggestion").innerText = "現在就吃：" + foods[random];
        }
    </script>

</body>
</html>
