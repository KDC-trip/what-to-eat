<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>美食大冒險 - 三合一抽獎機</title>
    <style>
        /* --- CSS 樣式直接整合在內 --- */
        :root { --active-color: #e67e22; }
        .theme-meal { --active-color: #e67e22; background-color: #fdf2e9; }
        .theme-snack { --active-color: #ff6b81; background-color: #fff0f3; }
        .theme-night { --active-color: #6c5ce7; background-color: #f3f0ff; }

        body { 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; margin: 0; font-family: "Microsoft JhengHei", sans-serif; 
            padding: 10px; transition: 0.3s; box-sizing: border-box;
        }

        /* 頂部導覽按鈕 */
        .nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 15px; width: 100%; }
        .nav button { 
            padding: 8px 15px; border-radius: 20px; border: none; color: white; 
            font-weight: bold; cursor: pointer; font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }

        /* 主容器：手機版寬度彈性 */
        .container { 
            text-align: center; background: white; padding: 20px; 
            border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            width: 100%; max-width: 500px; box-sizing: border-box; margin-bottom: 30px;
        }

        h1 { color: var(--active-color); margin: 5px 0 15px; font-size: 1.8rem; }

        /* 輸入區域 */
        .controls { display: flex; justify-content: center; gap: 5px; margin-bottom: 15px; }
        input { padding: 10px; border: 2px solid #eee; border-radius: 10px; width: 60%; outline: none; font-size: 16px; }
        .add-btn { background-color: var(--active-color); color: white; border: none; padding: 10px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* 遊戲視窗：正方形比例 */
        .game-view { 
            width: 100%; aspect-ratio: 1 / 1; max-width: 420px;
            margin: 0 auto; position: relative; 
            display: flex; align-items: center; justify-content: center; 
        }

        /* 格子樣式 */
        .board-grid { display: grid; gap: 8px; width: 100%; height: 100%; }
        .cell { 
            background: white; border: 1px solid #eee; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: clamp(10px, 3.5vw, 14px);
            color: #555; text-align: center; padding: 2px; overflow: hidden; line-height: 1.2;
        }
        .cell.active { 
            background-color: #ffeb3b !important; border-color: var(--active-color) !important; 
            color: var(--active-color) !important; transform: scale(1.08); z-index: 10; box-shadow: 0 0 15px rgba(0,0,0,0.1); 
        }
        .cell.special { border: 1px dashed #ff7675; color: #e74c3c; background-color: #fffafa; }

        /* 中間按鈕 */
        .center-btn-area { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20; width: 45%; }
        .main-btn { 
            width: 100%; padding: 12px 0; border-radius: 50px; border: none; 
            background: var(--active-color); color: white; font-weight: bold; 
            cursor: pointer; box-shadow: 0 6px 15px rgba(0,0,0,0.2); font-size: 1.1rem; 
        }

        /* 夜市拉霸機 */
        .slot-container { display: flex; align-items: center; justify-content: center; gap: 20px; width: 100%; height: 100%; }
        .slot-machine { background: #2d3436; border: 6px solid #636e72; border-radius: 20px; padding: 20px; width: 70%; box-shadow: inset 0 0 30px rgba(0,0,0,0.5); }
        .slot-window { 
            width: 100%; height: 80px; background: white; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: clamp(1rem, 5vw, 1.6rem); font-weight: bold; color: #6c5ce7; 
            box-shadow: inset 0 0 15px rgba(0,0,0,0.3); padding: 5px; 
        }

        /* 垂直拉桿 */
        .lever-base { width: 20px; height: 120px; background: #333; border-radius: 8px; position: relative; cursor: pointer; border: 2px solid #555; }
        .lever-arm { width: 10px; height: 70px; background: linear-gradient(to bottom, #999, #666); position: absolute; top: 5px; left: 50%; transform: translateX(-50%); transition: 0.3s; border-radius: 4px; }
        .lever-knob { width: 36px; height: 36px; background: radial-gradient(circle at 30% 30%, #ff4d4d, #b30000); border-radius: 50%; position: absolute; top: -25px; left: 50%; transform: translateX(-50%); box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .lever-arm.pulling { top: 50px; height: 40px; }

        /* 獎池名單 */
        .food-pool { margin-top: 20px; padding: 12px; background: #f9f9f9; border-radius: 15px; border: 1px solid #eee; width: 100%; box-sizing: border-box; }
        .pool-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; }
        .pool-item { background: white; border: 1px solid #ddd; padding: 4px 10px; border-radius: 20px; font-size: 11px; color: #666; display: flex; align-items: center; gap: 4px; }
        .pool-item b { color: #ff4d4d; cursor: pointer; font-size: 14px; }

        #result-text { font-size: 1.4rem; font-weight: bold; margin-top: 20px; min-height: 35px; color: #333; }
    </style>
</head>
<body class="theme-meal">

    <div class="nav">
        <button style="background: #e67e22;" onclick="switchMode('meal')">🍱 正餐大富翁</button>
        <button style="background: #ff6b81;" onclick="switchMode('snack')">🍰 點心驚喜盒</button>
        <button style="background: #6c5ce7;" onclick="switchMode('night')">🎡 夜市拉霸機</button>
    </div>

    <div class="container">
        <h1 id="title">🍱 正餐大富翁</h1>
        
        <div class="controls">
            <input type="text" id="foodInput" placeholder="想吃什麼？" onkeypress="if(event.key==='Enter') addFood()">
            <button class="add-btn" onclick="addFood()">新增</button>
        </div>

        <div class="game-view" id="gameView"></div>

        <div class="food-pool">
            <div style="font-weight: bold; margin-bottom: 10px; color: #888; font-size: 0.8rem;">📜 目前名單 (點擊 ✕ 刪除)：</div>
            <div id="poolList" class="pool-list"></div>
        </div>

        <div id="result-text">準備好了嗎？</div>
    </div>

<script>
    // 預設資料
    const defaultData = {
        meal: ["牛肉麵", "壽司", "滷肉飯", "便利商店", "水餃", "煎餃", "麥當勞", "義大利麵", "火鍋", "拉麵", "便當", "肯德基"],
        snack: ["雞蛋仔", "紅豆餅", "雞排", "地瓜球", "手搖飲", "可麗餅", "甜甜圈", "鬆餅", "豆花", "冰淇淋", "布丁", "泡芙"],
        night: ["臭豆腐", "蚵仔煎", "大腸包小腸", "烤魷魚", "排骨酥", "章魚燒", "地瓜球", "骰子牛", "糖葫蘆", "滷味", "鹹酥雞", "胡椒餅"]
    };
    const fillers = ["下 1 格", "前 3 格", "下 2 格", "再選一次"];
    
    let currentMode = 'meal';
    let foods = [...defaultData.meal];
    let gridContent = [];
    let isRunning = false;
    let currentIndex = 0;

    function switchMode(mode) {
        if(isRunning) return;
        currentMode = mode;
        foods = [...defaultData[mode]];
        document.body.className = `theme-${mode}`;
        document.getElementById('title').innerText = mode==='meal'?"🍱 正餐大富翁":mode==='snack'?"🍰 點心驚喜盒":"🎡 夜市拉霸機";
        refreshUI();
    }

    function refreshUI() {
        renderGameView();
        renderPoolList();
    }

    function renderGameView() {
        const view = document.getElementById("gameView");
        view.innerHTML = "";
        
        if (currentMode === 'night') {
            view.innerHTML = `
                <div class="slot-container">
                    <div class="slot-machine"><div class="slot-window" id="slotOutput">? ? ?</div></div>
                    <div class="lever-base" onclick="handleLeverClick()">
                        <div class="lever-arm" id="leverArm"><div class="lever-knob"></div></div>
                    </div>
                </div>`;
        } else {
            const board = document.createElement('div');
            board.className = "board-grid";
            let n = 4; while ((4 * n - 4) < foods.length) n++;
            board.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
            board.style.gridTemplateRows = `repeat(${n}, 1fr)`;
            
            gridContent = [...foods].sort(() => Math.random() - 0.5);
            let fIdx = 0; while (gridContent.length < (4*n-4)) { gridContent.push(fillers[fIdx % fillers.length]); fIdx++; }
            gridContent = gridContent.sort(() => Math.random() - 0.5);

            const path = [];
            for (let i = 0; i < n; i++) path.push({r: 1, c: i + 1});
            for (let i = 2; i < n; i++) path.push({r: i, c: n});
            for (let i = n; i >= 1; i--) path.push({r: n, c: i});
            for (let i = n - 1; i >= 2; i--) path.push({r: i, c: 1});

            gridContent.forEach((text, i) => {
                const div = document.createElement('div');
                div.className = 'cell' + (fillers.includes(text) ? ' special' : '');
                div.id = `cell-${i}`; div.innerText = text;
                div.style.gridRow = path[i].r; div.style.gridColumn = path[i].c;
                board.appendChild(div);
            });
            view.appendChild(board);
            const btnArea = document.createElement('div');
            btnArea.className = "center-btn-area";
            btnArea.innerHTML = `<button class="main-btn" onclick="startGridGame()">幫我選一個</button>`;
            view.appendChild(btnArea);
        }
    }

    function renderPoolList() {
        const list = document.getElementById("poolList");
        list.innerHTML = "";
        foods.forEach((f, idx) => {
            const span = document.createElement("span");
            span.className = "pool-item";
            span.innerHTML = `${f} <b onclick="removeFood(${idx})">✕</b>`;
            list.appendChild(span);
        });
    }

    function addFood() {
        const input = document.getElementById("foodInput");
        if(input.value.trim()){ foods.push(input.value.trim()); input.value=""; refreshUI(); }
    }

    function removeFood(idx) {
        if(isRunning) return;
        foods.splice(idx, 1); refreshUI();
    }

    function handleLeverClick() {
        if(isRunning || foods.length === 0) return;
        const arm = document.getElementById("leverArm");
        arm.classList.add("pulling");
        setTimeout(() => { arm.classList.remove("pulling"); startSlotGame(); }, 300);
    }

    function startSlotGame() {
        isRunning = true; const out = document.getElementById("slotOutput");
        let count = 0;
        const timer = setInterval(() => {
            const res = foods[Math.floor(Math.random()*foods.length)];
            out.innerText = res;
            if(count++ > 30){ clearInterval(timer); isRunning=false; document.getElementById("result-text").innerText="🎉 抽到："+res; }
        }, 70);
    }

    function startGridGame() {
        if(isRunning || gridContent.length === 0) return;
        isRunning = true; document.getElementById("result-text").innerText = "挑選中...";
        let steps = 0; let rounds = 3;
        let total = gridContent.length * rounds + Math.floor(Math.random()*gridContent.length);
        let speed = 50;
        function run() {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
            currentIndex = currentMode==='meal' ? (currentIndex+1)%gridContent.length : Math.floor(Math.random()*gridContent.length);
            const activeCell = document.getElementById(`cell-${currentIndex}`);
            if(activeCell) activeCell.classList.add('active');
            if(++steps < total){ if(total-steps < 15) speed += 30; setTimeout(run, speed); }
            else { handleGridResult(); }
        }
        run();
    }

    function handleGridResult() {
        const res = gridContent[currentIndex];
        if (fillers.includes(res)) {
            let s = res === "下 1 格" ? 1 : res === "下 2 格" ? 2 : res === "前 3 格" ? -3 : 0;
            if(s !== 0) {
                document.getElementById("result-text").innerText = `🎲 觸發：${res}！`;
                setTimeout(() => {
                    document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
                    currentIndex = (currentIndex + s + gridContent.length) % gridContent.length;
                    document.getElementById(`cell-${currentIndex}`).classList.add('active');
                    handleGridResult();
                }, 1000);
            } else {
                document.getElementById("result-text").innerText = "🎲 再選一次！";
                setTimeout(() => { isRunning = false; startGridGame(); }, 1500);
            }
        } else {
            isRunning = false; document.getElementById("result-text").innerText = "🎉 決定吃：" + res;
        }
    }

    refreshUI();
</script>
</body>
</html>
