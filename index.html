<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>美食大富翁 - 趣味填充版</title>
    <style>
        body { background-color: #fdf2e9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: "Microsoft JhengHei", sans-serif; }
        .container { text-align: center; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 550px; }
        h1 { color: #e67e22; margin-top: 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .controls { margin-bottom: 20px; }
        input { padding: 10px; border: 2px solid #fbdcbe; border-radius: 8px; width: 200px; outline: none; }
        button { background-color: #e67e22; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        button:hover { background-color: #d35400; }
        button:disabled { background-color: #ccc; }

        .board { display: grid; gap: 10px; margin: 20px auto; width: 450px; height: 450px; position: relative; }
        .cell { background: white; border: 2px solid #fbdcbe; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 15px; color: #555; transition: 0.1s; position: relative; padding: 5px; text-align: center; box-shadow: 2px 2px 5px rgba(0,0,0,0.03); }
        .cell.special { color: #e74c3c; background-color: #fff5f5; border-style: dashed; }
        .cell.active { background-color: #ffeb3b; border-color: #e67e22; color: #e67e22; transform: scale(1.08); z-index: 5; box-shadow: 0 0 15px rgba(230, 126, 34, 0.5); }

        .center-area { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; width: 45%; }
        .decide-btn { width: 100%; padding: 15px; font-size: 1.3rem; border-radius: 15px; box-shadow: 0 6px 12px rgba(230, 126, 34, 0.3); }
        #result-text { font-size: 1.5rem; color: #d35400; font-weight: bold; margin-top: 20px; height: 35px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍱 美食大富翁</h1>
    <div class="controls">
        <input type="text" id="foodInput" placeholder="想吃什麼？" onkeypress="if(event.key==='Enter') addFood()">
        <button onclick="addFood()">新增</button>
    </div>
    <div class="board" id="board">
        <div class="center-area">
            <button class="decide-btn" id="startBtn" onclick="startGame()">幫我選一個</button>
        </div>
    </div>
    <div id="result-text">準備好了嗎？</div>
</div>

<script>
    let foods = ["牛肉麵", "壽司", "滷肉飯", "超商", "水餃", "煎餃", "豆花", "麥當勞", "義麵", "火鍋", "拉麵", "便當"];
    const specialItems = ["下 1 格", "前 3 格", "下 2 格", "再選一次"];
    let currentDisplayList = [];
    let currentIndex = 0;
    let isRunning = false;

    function renderBoard() {
        const board = document.getElementById("board");
        board.querySelectorAll('.cell').forEach(c => c.remove());

        // 1. 計算矩形規格 n x n
        let n = Math.ceil((foods.length + 4) / 4);
        if (n < 4) n = 4;
        const totalCapacity = 4 * n - 4; // 矩形外圈總格數

        // 2. 打亂原始食物清單 (Shuffle)
        let shuffledFoods = [...foods].sort(() => Math.random() - 0.5);

        // 3. 填充剩餘空格
        currentDisplayList = [...shuffledFoods];
        let specialIdx = 0;
        while (currentDisplayList.length < totalCapacity) {
            currentDisplayList.push(specialItems[specialIdx % specialItems.length]);
            specialIdx++;
        }

        // 4. 設定 Grid
        board.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
        board.style.gridTemplateRows = `repeat(${n}, 1fr)`;

        // 5. 計算順時針路徑
        const path = [];
        for (let i = 0; i < n; i++) path.push({r: 1, c: i + 1}); // 上
        for (let i = 2; i < n; i++) path.push({r: i, c: n});     // 右
        for (let i = n; i >= 1; i--) path.push({r: n, c: i});    // 下
        for (let i = n - 1; i >= 2; i--) path.push({r: i, c: 1}); // 左

        // 6. 渲染
        currentDisplayList.forEach((text, i) => {
            const div = document.createElement('div');
            div.className = 'cell';
            if (specialItems.includes(text)) div.classList.add('special');
            div.id = `cell-${i}`;
            div.innerText = text;
            div.style.gridRow = path[i].r;
            div.style.gridColumn = path[i].c;
            if (n > 5) div.style.fontSize = "13px";
            board.appendChild(div);
        });
    }

    function addFood() {
        const input = document.getElementById("foodInput");
        if (input.value.trim()) {
            foods.push(input.value.trim());
            input.value = "";
            renderBoard(); // 新增後會自動打亂位置並填補
        }
    }

    function startGame() {
        if (isRunning || foods.length === 0) return;
        isRunning = true;
        document.getElementById("startBtn").disabled = true;
        document.getElementById("result-text").innerText = "命運轉動中...";

        let rounds = 3;
        let totalSteps = (currentDisplayList.length * rounds) + Math.floor(Math.random() * currentDisplayList.length);
        let currentStep = 0;
        let speed = 50;

        function roll() {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
            currentIndex = (currentIndex + 1) % currentDisplayList.length;
            document.getElementById(`cell-${currentIndex}`).classList.add('active');

            currentStep++;
            if (currentStep < totalSteps) {
                if (totalSteps - currentStep < 10) speed += 50;
                setTimeout(roll, speed);
            } else {
                handleResult(currentDisplayList[currentIndex]);
            }
        }
        roll();
    }

    function handleResult(result) {
        isRunning = false;
        document.getElementById("startBtn").disabled = false;
        
        if (specialItems.includes(result)) {
            document.getElementById("result-text").innerText = "🎲 抽到：" + result + "！";
            // 如果抽到特殊格，可以讓使用者手動再點一次或自動跳轉，這裡先顯示結果
        } else {
            document.getElementById("result-text").innerText = "🎉 今天吃：" + result;
        }
    }

    renderBoard();
</script>

</body>
</html>
