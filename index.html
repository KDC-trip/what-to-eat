<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食全攻略：大富翁、驚喜盒與拉霸機</title>
    <style>
        /* 樣式整合 */
        :root { --active-color: #e67e22; }
        .theme-meal { --active-color: #e67e22; background-color: #fdf2e9; }
        .theme-snack { --active-color: #ff6b81; background-color: #fff0f3; }
        .theme-night { --active-color: #6c5ce7; background-color: #f3f0ff; }

        body { display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; font-family: "Microsoft JhengHei", sans-serif; padding-top: 20px; transition: 0.3s; }

        /* 頂部導覽 */
        .nav { display: flex; gap: 12px; margin-bottom: 20px; z-index: 100; }
        .nav button { padding: 10px 20px; border-radius: 25px; border: none; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s; }
        .nav button:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* 主容器 */
        .container { text-align: center; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 580px; min-height: 800px; margin-bottom: 50px; }
        h1 { color: var(--active-color); margin: 10px 0 20px; font-size: 2.2rem; }

        /* 輸入區 */
        .controls { margin-bottom: 20px; }
        input { padding: 12px; border: 2px solid #eee; border-radius: 10px; width: 220px; outline: none; font-size: 1rem; }
        .add-btn { background-color: var(--active-color); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-left: 8px; }

        /* 遊戲視窗 */
        .game-view { width: 480px; height: 480px; margin: 0 auto; position: relative; display: flex; align-items: center; justify-content: center; }

        /* 格子模式 (大富翁 & 驚喜盒) */
        .board-grid { display: grid; gap: 10px; width: 100%; height: 100%; }
        .cell { background: white; border: 2px solid #eee; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; color: #555; text-align: center; padding: 5px; transition: 0.1s; }
        .cell.active { background-color: #ffeb3b !important; border-color: var(--active-color) !important; color: var(--active-color) !important; transform: scale(1.1); z-index: 10; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        .cell.special { border: 2px dashed #ff7675; color: #e74c3c; background-color: #fffafa; }

        /* 夜市版：拉霸機與垂直搖桿 */
        .slot-container { display: flex; align-items: center; justify-content: center; gap: 40px; height: 100%; }
        .slot-machine { background: #2d3436; border: 8px solid #636e72; border-radius: 25px; padding: 40px; box-shadow: inset 0 0 40px rgba(0,0,0,0.5); }
        .slot-window { width: 260px; height: 120px; background: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; color: #6c5ce7; box-shadow: inset 0 0 20px rgba(0,0,0,0.3); padding: 10px; text-align: center; }
        
        /* 垂直拉桿結構 */
        .lever-base { width: 22px; height: 130px; background: #333; border-radius: 10px; position: relative; cursor: pointer; border: 2px solid #555; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5); }
        .lever-arm { width: 10px; height: 80px; background: linear-gradient(to bottom, #999, #666); position: absolute; top: 5px; left: 50%; transform: translateX(-50%); transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); border-radius: 5px; }
        .lever-knob { width: 38px; height: 38px; background: radial-gradient(circle at 30% 30%, #ff4d4d, #b30000); border-radius: 50%; position: absolute; top: -25px; left: 50%; transform: translateX(-50%); box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .lever-arm.pulling { top: 60px; height: 40px; } /* 垂直下拉動畫 */

        /* 獎池清單 */
        .food-pool { margin-top: 30px; padding: 15px; background: #f9f9f9; border-radius: 15px; border: 1px solid #eee; }
        .pool-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .pool-item { background: white; border: 1px solid #ddd; padding: 6px 14px; border-radius: 20px; font-size: 13px; color: #555; display: flex; align-items: center; gap: 8px; box-shadow: 1px 1px 3px rgba(0,0,0,0.05); }
        .pool-item b { color: #ff4d4d; cursor: pointer; font-size: 16px; padding: 0 2px; }
        .pool-item b:hover { color: #cc0000; }

        /* 中間按鈕 */
        .center-btn-area { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20; }
        .main-btn { padding: 16px 35px; border-radius: 50px; border: none; background: var(--active-color); color: white; font-weight: bold; cursor: pointer; box-shadow: 0 6px 15px rgba(0,0,0,0.2); font-size: 1.2rem; transition: 0.2s; }
        .main-btn:hover { transform: scale(1.05); filter: brightness(1.1); }
        .main-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }

        #result-text { font-size: 1.6rem; font-weight: bold; margin-top: 25px; min-height: 40px; color: #333; }
    </style>
</head>
<body class="theme-meal">

    <!-- 頂部切換鈕 -->
    <div class="nav">
        <button style="background: #e67e22;" onclick="switchMode('meal')">🍱 正餐大富翁</button>
        <button style="background: #ff6b81;" onclick="switchMode('snack')">🍰 點心驚喜盒</button>
        <button style="background: #6c5ce7;" onclick="switchMode('night')">🎡 夜市拉霸機</button>
    </div>

    <div class="container">
        <h1 id="title">🍱 正餐大富翁</h1>
        
        <div class="controls">
            <input type="text" id="foodInput" placeholder="想吃什麼？" onkeypress="if(event.key==='Enter') addFood()">
            <button class="add-btn" onclick="addFood()">新增</button>
        </div>

        <div class="game-view" id="gameView">
            <!-- 由 JS 動態生成遊戲內容 -->
        </div>

        <!-- 獎池名單 -->
        <div class="food-pool">
            <div style="font-weight: bold; margin-bottom: 12px; color: #888; font-size: 0.9rem;">📜 目前名單 (點擊 ✕ 刪除)：</div>
            <div id="poolList" class="pool-list"></div>
        </div>

        <div id="result-text">準備好了嗎？</div>
    </div>

<script>
    // 1. 初始化資料
    const defaultData = {
        meal: ["牛肉麵", "壽司", "滷肉飯", "便利商店", "水餃", "煎餃", "麥當勞", "義大利麵", "火鍋", "拉麵", "便當", "肯德基"],
        snack: ["雞蛋仔", "紅豆餅", "雞排", "地瓜球", "手搖飲", "可麗餅", "甜甜圈", "鬆餅", "豆花", "冰淇淋", "布丁", "泡芙"],
        night: ["臭豆腐", "蚵仔煎", "大腸包小腸", "烤魷魚", "排骨酥", "章魚燒", "地瓜球", "骰子牛", "糖葫蘆", "滷味", "鹹酥雞", "胡椒餅"]
    };
    const fillers = ["下 1 格", "前 3 格", "下 2 格", "再選一次"];
    
    let currentMode = 'meal';
    let foods = [...defaultData.meal];
    let gridContent = [];
    let isRunning = false;
    let currentIndex = 0;

    // 2. 模式切換邏輯
    function switchMode(mode) {
        if(isRunning) return;
        currentMode = mode;
        foods = [...defaultData[mode]];
        document.body.className = `theme-${mode}`;
        
        const titles = { meal: "🍱 正餐大富翁", snack: "🍰 點心驚喜盒", night: "🎡 夜市拉霸機" };
        document.getElementById('title').innerText = titles[mode];
        document.getElementById('result-text').innerText = "準備好了嗎？";
        
        refreshUI();
    }

    // 3. 渲染主視窗與獎池
    function refreshUI() {
        renderGameView();
        renderPoolList();
    }

    function renderGameView() {
        const view = document.getElementById("gameView");
        view.innerHTML = "";
        
        if (currentMode === 'night') {
            // 拉霸機 HTML
            view.innerHTML = `
                <div class="slot-container">
                    <div class="slot-machine">
                        <div class="slot-window" id="slotOutput">? ? ?</div>
                    </div>
                    <div class="lever-base" onclick="handleLeverClick()">
                        <div class="lever-arm" id="leverArm"><div class="lever-knob"></div></div>
                    </div>
                </div>
            `;
        } else {
            // 格子模式 HTML
            const board = document.createElement('div');
            board.className = "board-grid";
            
            // 計算網格大小 n x n
            let n = 4;
            while ((4 * n - 4) < foods.length) n++;
            board.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
            board.style.gridTemplateRows = `repeat(${n}, 1fr)`;
            
            const totalCells = 4 * n - 4;
            gridContent = [...foods].sort(() => Math.random() - 0.5);
            
            // 自動補滿特殊格
            let fIdx = 0;
            while (gridContent.length < totalCells) {
                gridContent.push(fillers[fIdx % fillers.length]);
                fIdx++;
            }
            gridContent = gridContent.sort(() => Math.random() - 0.5);

            // 計算路徑座標
            const path = [];
            for (let i = 0; i < n; i++) path.push({r: 1, c: i + 1}); // Top
            for (let i = 2; i < n; i++) path.push({r: i, c: n});     // Right
            for (let i = n; i >= 1; i--) path.push({r: n, c: i});    // Bottom
            for (let i = n - 1; i >= 2; i--) path.push({r: i, c: 1}); // Left

            gridContent.forEach((text, i) => {
                const div = document.createElement('div');
                div.className = 'cell' + (fillers.includes(text) ? ' special' : '');
                div.id = `cell-${i}`;
                div.innerText = text;
                div.style.gridRow = path[i].r;
                div.style.gridColumn = path[i].c;
                board.appendChild(div);
            });

            const btnArea = document.createElement('div');
            btnArea.className = "center-btn-area";
            btnArea.innerHTML = `<button class="main-btn" id="startBtn" onclick="startGridGame()">幫我選一個</button>`;
            
            view.appendChild(board);
            view.appendChild(btnArea);
        }
    }

    function renderPoolList() {
        const list = document.getElementById("poolList");
        list.innerHTML = "";
        foods.forEach((f, idx) => {
            const span = document.createElement("span");
            span.className = "pool-item";
            span.innerHTML = `${f} <b onclick="removeFood(${idx})">✕</b>`;
            list.appendChild(span);
        });
    }

    // 4. 功能邏輯
    function addFood() {
        const input = document.getElementById("foodInput");
        if (input.value.trim()) {
            foods.push(input.value.trim());
            input.value = "";
            refreshUI();
        }
    }

    function removeFood(idx) {
        if (isRunning) return;
        foods.splice(idx, 1);
        refreshUI();
    }

    function handleLeverClick() {
        if (isRunning || foods.length === 0) return;
        const arm = document.getElementById("leverArm");
        arm.classList.add("pulling");
        setTimeout(() => {
            arm.classList.remove("pulling");
            startSlotGame();
        }, 300);
    }

    function startSlotGame() {
        isRunning = true;
        const output = document.getElementById("slotOutput");
        document.getElementById("result-text").innerText = "滾動中...";
        let count = 0;
        const timer = setInterval(() => {
            const randomPick = foods[Math.floor(Math.random() * foods.length)];
            output.innerText = randomPick;
            if (count++ > 30) {
                clearInterval(timer);
                isRunning = false;
                document.getElementById("result-text").innerText = "🎉 最終抽到：" + randomPick;
            }
        }, 70);
    }

    function startGridGame() {
        if (isRunning || gridContent.length === 0) return;
        isRunning = true;
        document.getElementById("startBtn").disabled = true;
        document.getElementById("result-text").innerText = "挑選中...";
        
        let steps = 0;
        let rounds = Math.floor(Math.random() * 2) + 3;
        let totalSteps = gridContent.length * rounds + Math.floor(Math.random() * gridContent.length);
        let speed = 50;

        function run() {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
            
            if (currentMode === 'meal') {
                currentIndex = (currentIndex + 1) % gridContent.length;
            } else {
                currentIndex = Math.floor(Math.random() * gridContent.length); // 驚喜盒閃爍
            }
            
            document.getElementById(`cell-${currentIndex}`).classList.add('active');
            
            if (++steps < totalSteps) {
                if (totalSteps - steps < 15) speed += 30;
                setTimeout(run, speed);
            } else {
                handleGridResult();
            }
        }
        run();
    }

    function handleGridResult() {
        const res = gridContent[currentIndex];
        if (res === "下 1 格") { jump(1); }
        else if (res === "下 2 格") { jump(2); }
        else if (res === "前 3 格") { jump(-3); }
        else if (res === "再選一次") {
            document.getElementById("result-text").innerText = "🎲 再選一次！三秒後重抽...";
            setTimeout(() => { isRunning = false; startGridGame(); }, 2000);
        } else {
            isRunning = false;
            document.getElementById("startBtn").disabled = false;
            document.getElementById("result-text").innerText = "🎉 決定吃：" + res;
        }
    }

    function jump(s) {
        document.getElementById("result-text").innerText = `🎲 觸發：${gridContent[currentIndex]}！`;
        setTimeout(() => {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
            currentIndex = (currentIndex + s + gridContent.length) % gridContent.length;
            document.getElementById(`cell-${currentIndex}`).classList.add('active');
            handleGridResult();
        }, 1000);
    }

    // 初始渲染
    refreshUI();
</script>
</body>
</html>
