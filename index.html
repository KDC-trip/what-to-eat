<!-- 將這段覆蓋 index.html 的 <body> 部分 -->
<body class="theme-meal">

    <div class="nav">
        <button style="background: #e67e22;" onclick="switchMode('meal')">🍱 正餐大富翁</button>
        <button style="background: #ff6b81;" onclick="switchMode('snack')">🍰 點心驚喜盒</button>
        <button style="background: #6c5ce7;" onclick="switchMode('night')">🎡 夜市抽獎機</button>
    </div>

    <div class="container">
        <h1 id="title">🍱 正餐大富翁</h1>
        
        <div class="controls">
            <input type="text" id="foodInput" placeholder="想吃什麼？" onkeypress="if(event.key==='Enter') addFood()">
            <button class="add-btn" onclick="addFood()">新增</button>
        </div>

        <div class="game-view" id="gameView">
            <!-- 動態生成 -->
        </div>

        <!-- 新增：目前的選項清單區域 -->
        <div class="food-pool">
            <div style="font-weight: bold; margin-bottom: 10px; color: #666;">📜 目前獎池 (點擊 ✕ 刪除)：</div>
            <div id="poolList" class="pool-list"></div>
        </div>

        <div id="result-text">準備好了嗎？</div>
    </div>

<script>
    // 預設資料
    const data = {
        meal: ["牛肉麵", "壽司", "滷肉飯", "便利商店", "水餃", "煎餃", "麥當勞", "義大利麵", "火鍋", "拉麵", "便當", "肯德基"],
        snack: ["雞蛋仔", "紅豆餅", "雞排", "地瓜球", "手搖飲", "可麗餅", "甜甜圈", "鬆餅", "豆花", "冰淇淋", "布丁", "泡芙"],
        night: ["臭豆腐", "蚵仔煎", "大腸包小腸", "烤魷魚", "排骨酥", "章魚燒", "地瓜球", "骰子牛", "糖葫蘆", "滷味", "鹹酥雞", "胡椒餅"]
    };
    const fillers = ["下 1 格", "前 3 格", "下 2 格", "再選一次"];
    
    let currentMode = 'meal';
    let foods = [...data.meal];
    let isRunning = false;

    function switchMode(mode) {
        if(isRunning) return;
        currentMode = mode;
        foods = [...data[mode]];
        document.body.className = `theme-${mode}`;
        document.getElementById('title').innerText = mode==='meal'?"🍱 正餐大富翁":mode==='snack'?"🍰 點心驚喜盒":"🎡 夜市抽獎機";
        renderView();
        updatePoolUI();
    }

    function renderView() {
        const view = document.getElementById("gameView");
        view.innerHTML = "";
        
        if (currentMode === 'night') {
            // 夜市抽獎機：加入拉桿 HTML
            view.innerHTML = `
                <div class="slot-container">
                    <div class="slot-machine">
                        <div class="slot-window" id="slotOutput">? ? ?</div>
                    </div>
                    <!-- 實體搖桿結構 -->
                    <div class="lever-base" onclick="handleLeverClick()">
                        <div class="lever-arm" id="leverArm">
                            <div class="lever-knob"></div>
                        </div>
                    </div>
                </div>
            `;
        } else {
            // 大富翁 & 驚喜盒 (邏輯同前，略縮寫)
            const board = document.createElement('div');
            board.className = "board-grid";
            // ... (此處保留原有的 Grid 生成邏輯)
            // 為了簡潔，建議直接套用你原本 index.html 內的 renderView 邏輯
            view.innerHTML = `<div class="board-grid" id="gridBoard"></div><div class="center-btn-area"><button class="main-btn" onclick="startGridGame()">幫我選一個</button></div>`;
            rebuildGrid(); 
        }
    }

    // 更新下方獎池 UI
    function updatePoolUI() {
        const list = document.getElementById("poolList");
        list.innerHTML = "";
        foods.forEach((f, index) => {
            const span = document.createElement("span");
            span.className = "pool-item";
            span.innerHTML = `${f} <b onclick="removeFood(${index})">✕</b>`;
            list.appendChild(span);
        });
    }

    function removeFood(index) {
        if(isRunning) return;
        foods.splice(index, 1);
        updatePoolUI();
        renderView();
    }

    function handleLeverClick() {
        if(isRunning) return;
        const arm = document.getElementById("leverArm");
        arm.classList.add("pulling"); // 觸發拉桿動畫
        setTimeout(() => arm.classList.remove("pulling"), 500);
        startSlotGame();
    }

    // (其餘 startSlotGame, startGridGame 邏輯維持不變)
    // ...
</script>
</body>
